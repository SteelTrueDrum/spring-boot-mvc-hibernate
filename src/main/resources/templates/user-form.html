<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">

<head>
    <meta charset="UTF-8">
    <title>Форма пользователя</title>
</head>
<body>

<h2 th:text="${user.id == null} ? 'Добавить пользователя' : 'Редактировать пользователя'">Форма</h2>

<!-- Динамически меняем URL: /save для создания, /update для редактирования -->
<form th:action="@{|${user.id == null ? '/save' : '/update'}|}" th:object="${user}" method="post">
    <!-- Скрытое поле ID для корректного обновления -->
    <input type="hidden" th:field="*{id}" />

    <label for="firstname">Имя:</label>
    <input type="text" id="firstname" th:field="*{firstName}" required />
    <br/><br/>

    <label for="lastname">Фамилия:</label>
    <input type="text" id="lastname" th:field="*{lastName}" required />
    <br/><br/>


    <label for="email">Email:</label>
    <input type="email" id="email" th:field="*{email}" required />
    <br/><br/>

    <button type="submit" th:text="${user.id == null} ? 'Создать' : 'Сохранить'">Отправить</button>
</form>

<br/>
<a th:href="@{/}">Назад к списку</a>

</body>
</html>
